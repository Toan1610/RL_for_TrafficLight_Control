# MGMQ Model Configuration
# Các tham số mô hình MGMQ cho training và evaluation

# ============================================
# Network Configuration
# ============================================
network:
  # Name of the traffic network (used as folder name under network/)
  name: zurich

  # Base path for network files (relative to project root)
  # If not specified, defaults to: network/{network_name}/
  base_path: null

  # Network files (relative to base_path if base_path is set, or absolute paths)
  net_file: zurich.net.xml

  # Route files - can be a single file or comma-separated list
  # Order matters: type definitions should come before trip definitions
  route_files:
    - zurich.rou.xml       # Vehicle type definitions (vTypes only)
    - zurich-demo.rou.xml  # Trips (3052 vehicles, depart up to 3597s)

  # Detector configuration file (for E2 detector-based rewards)
  detector_file: detector.add.xml

  # Intersection preprocessing config (for phase standardization)
  intersection_config: intersection_config.json

# ============================================
# MGMQ Architecture Parameters
# ============================================
# Section 9.8: Reduced hidden_dim to 32-64 (Permutation Invariant with Mean Pooling)
mgmq:
  # GAT (Graph Attention Network) parameters
  gat:
    hidden_dim: 32 # GAT hidden dimension (reduced from 64)
    output_dim: 16 # GAT output dimension per head (compact)
    num_heads: 2 # Number of GAT attention heads (reduced for efficiency)

  # GraphSAGE parameters
  graphsage:
    hidden_dim: 64 # GraphSAGE hidden dimension

  # Bi-GRU parameters
  gru:
    hidden_dim: 32 # Bi-GRU hidden dimension (reduced)

  # Policy and Value network parameters
  policy:
    hidden_dims: [128, 64] # Policy network hidden dimensions

  value:
    hidden_dims: [128, 64] # Value network hidden dimensions

  # Regularization
  dropout: 0.1 # Low dropout for RL

  # Temporal observation
  history_length: 6 # Observation history length (window size)

  # Section 9.8: Do NOT detach Critic gradient from encoder
  vf_share_coeff: 1.0 # 1.0 = Critic gradient flows through encoder (required)

  # Local GNN settings
  local_gnn:
    enabled: false # Use LocalMGMQTorchModel
    max_neighbors: 4 # Maximum neighbors (K) for local GNN
    obs_dim: 48 # 4 features * 12 detectors

# ============================================
# PPO Training Parameters
# ============================================
ppo:
  # Section 9.4: Standard lr, no need to separate Actor/Critic
  learning_rate: 0.0003 # 3e-4 standard PPO learning rate
  # Section 9.5: gamma=0.995 for 90s cycle (0.995^90 ≈ 0.64, preserves long-term signal)
  gamma: 0.995 # Discount factor (CRITICAL for 90s action duration)
  lambda_: 0.95 # GAE lambda
  # Section 9.6: Entropy coefficient for Dirichlet - not too high (collapse), not too low
  entropy_coeff: 0.01 # Entropy coefficient (max 0.02, never > 0.05)
  clip_param: 0.2 # Standard PPO clip parameter
  # KL constraint prevents policy jump with large updates
  kl_coeff: 0.2 # Initial KL penalty coefficient (do NOT set to 0)
  kl_target: 0.03 # KL target - relaxed from 0.01 to prevent kl_coeff explosion (25x)
  # vf_clip_param: must be >= max episode return. With hybrid-waiting-pressure,
  # episode returns can reach ~100+. Too small (10.0) prevents VF from learning.
  vf_clip_param: 10.0 # Value function clip (set >= max expected episode return)
  # Section 9.4: vf_loss_coeff=1.0 so Critic learns fast enough
  vf_loss_coeff: 1.0 # Value loss coefficient (Critic must learn quickly)
  # With num_seconds=3600, cycle_time=90: ~40 steps/episode, 16 agents
  # 1 episode = 40*16 = 640 agent_steps. 4 episodes = 2560
  # Heavy traffic (36k veh) is slow to simulate → keep batch small to avoid timeout
  train_batch_size: 4640 # 4 episodes/batch: 40steps * 16agents = 640/ep
  minibatch_size: 512 # SGD minibatch size
  num_sgd_iter: 5 # Number of SGD epochs per training batch
  grad_clip: 10.0 # Gradient clipping (standard for GNN models)

# ============================================
# Training Settings
# ============================================
training:
  num_iterations: 500 # Training iterations
  num_workers: 4 # Parallel SUMO workers
  num_envs_per_worker: 1 # Environments per worker
  checkpoint_interval: 5 # Checkpoint frequency
  patience: 500 # Early stopping patience
  seed: 42 # Random seed
  use_gpu: false # Use GPU for training
  output_dir: "./results_mgmq" # Output directory

# ============================================
# Reward Configuration
# ============================================
reward:
  # Available reward functions:
  #   - cycle-diff-waiting-time  : W_before - W_after (paper, default)
  #   - diff-waiting-time        : Normalized waiting time reduction [-3, 3]
  #   - pressure                 : Proxy pressure from detectors (occupancy - speed) [-3, 3]
  #   - presslight-pressure      : PressLight |veh_in - veh_out| penalty [-3, 0]
  #   - hybrid-waiting-pressure  : cycle-diff-waiting-time + pressure penalty (SOTA)
  #   - average-speed            : Normalized average speed [-3, 3]
  #   - queue                    : Queue length penalty [-3, 3]
  #   - halt-veh-by-detectors    : Halting vehicle penalty [-3, 0]
  #   - diff-departed-veh        : Throughput (departed vehicles) [0, 3]
  #   - teleport-penalty         : Teleportation penalty [-3, 0]
  #
  # Can use a single function or a list with weights:
  #   functions: [cycle-diff-waiting-time, presslight-pressure]
  #   weights: [1.0, 0.5]
  #
  # Or use the hybrid reward (all-in-one):
  #   functions: [hybrid-waiting-pressure]
  functions:
    #- hybrid-waiting-pressure
    #- cycle-diff-waiting-time
    #- cycle-diff-waiting-time
    #- presslight-pressure
    - halt-veh-by-detectors
    - diff-waiting-time
    - diff-departed-veh
  weights: [0.2, 0.45, 0.35] # Weights for each reward function (must match functions list)

# ============================================
# Action Configuration
# ============================================
action:
  # Action mode: "discrete_adjustment" (recommended) or "ratio" (legacy)
  # discrete_adjustment: Each phase independently selects {-5s, 0s, +5s}
  #   - Enables countdown timers (green time fixed at cycle start)
  #   - Stable cycle-based control, gradual adjustments
  #   - Uses MultiDiscrete([3]*8) action space
  # ratio: Continuous Box[8] with time ratios (legacy)
  #   - Uses MaskedSoftmax distribution
  mode: discrete_adjustment
  # Time step for discrete adjustment (seconds)
  green_time_step: 5

# ============================================
# Environment Configuration
# ============================================
environment:
  num_seconds: 3600 # Simulation duration (30 minutes)
  max_green: 63     # Max green per phase: total_green(78s) - 3*min_green(5s) = 63s
  min_green: 5      # Minimum green time per phase (SUMO actual minimum: 6s)
  cycle_time: 90    # Traffic light cycle time = confirmed from net.xml (all 33 nodes = 90s)
  yellow_time: 3    # Yellow time per transition = confirmed from net.xml (3s each)
  time_to_teleport: 500 # Teleport stuck vehicles (-1 to disable)
  use_phase_standardizer: true # Map 4-value action to signal phases
  # Section 9.1: Enable reward normalization (ép Value loss về O(1))
  normalize_reward: true # RLlib normalize_rewards = True
  clip_rewards: 5.0 # Clip normalized rewards to [-10, 10]
